name: Deploy to Cloudflare Pages

# svo.bunkum.us is a fully static site (no build step): HTML, CSS, CSV data, a
# PDF, and vendored JS (Observable Plot + d3). Every push to main uploads
# public/ to the "svo" Pages project.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=svo --branch=main
